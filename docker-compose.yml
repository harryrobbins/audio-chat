services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - PHOENIX_COLLECTOR_ENDPOINT=http://phoenix:3000/v1/traces
      - PHOENIX_PROJECT_NAME=audio-chat
    depends_on:
      - phoenix

  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006" # Tracing collector
      - "3000:3000" # Web UI
    environment:
      - PHOENIX_PORT=3000
